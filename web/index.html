<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BusWay Pro - School Bus Fee Management">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Preload Plus Jakarta Sans (same font as React app) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BusWay Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BusWay Pro</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Preload font globally so Flutter picks it up instantly */
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: #0F172A;
      overflow: hidden;
    }

    /* Loading spinner before Flutter loads */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at center, #1E293B, #0F172A, #000);
    }
    .loading-logo {
      width: 64px;
      height: 64px;
      background: #1E40AF;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(30, 64, 175, 0.3);
      margin-bottom: 20px;
    }
    .loading-logo svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    .loading-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 3px;
      color: white;
      margin-bottom: 4px;
    }
    .loading-sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 900;
      font-size: 7px;
      letter-spacing: 4px;
      color: #1E40AF;
    }
    .loading-spinner {
      margin-top: 24px;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #1E40AF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="loading-logo">
      <svg viewBox="0 0 24 24"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
    </div>
    <div class="loading-text">BUSWAY PRO</div>
    <div class="loading-sub">ENTERPRISE FLEET</div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    // Remove loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
